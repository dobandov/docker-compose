version: '3.8'
services: 
  keycloak:
    container_name: keycloak-24
    build:
      context: .
      dockerfile: Dockerfile
    # Usar 'start' para producción, 'start-dev' solo para desarrollo
    command: start --optimized
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL_DATABASE: keycloak-24
      KC_DB_URL_HOST: postgres-db1
      KC_DB_URL_PORT: 5432
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: sfuKTJGExBqRTpPJXubX
      KC_DB_SCHEMA: public
      KC_FEATURES: scripts
      KC_PROXY: edge
      KC_HOSTNAME: keycloak.dobandov.com
      KC_HTTP_ENABLED: "true"
    restart: unless-stopped
    ports:
      - 7029:8080
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - postgres-network

volumes:
  keycloak-data:
    driver: local

networks:
  postgres-network:
    external: true